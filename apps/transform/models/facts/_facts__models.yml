version: 2

models:
  - name: fct_toggl_time_entries
    description: "Toggl time entries with FK resolution. DCMP data source."
    columns:
      - name: id
        data_tests: [unique, not_null]
      - name: source_id
        data_tests: [not_null]
      - name: started_at
        data_tests: [not_null]
      - name: stopped_at
        data_tests: [not_null]

  - name: fct_health_sleep
    description: "Daily sleep fact from Fitbit (main sleep only, one row per sleep_date)"
    columns:
      - name: id
        data_tests: [not_null]
      - name: sleep_date
        data_tests: [unique, not_null]
      - name: start_at
        data_tests: [not_null]
      - name: duration_seconds
        data_tests: [not_null]

  - name: fct_health_body
    description: "Daily body composition fact from Tanita Health Planet"
    columns:
      - name: id
        data_tests: [not_null]
      - name: measured_date
        data_tests: [unique, not_null]
      - name: weight
        data_tests: [not_null]

  - name: fct_zaim_transactions
    description: "Zaim transactions with category/genre/account names joined"
    columns:
      - name: id
        data_tests: [not_null]
      - name: source_id
        data_tests: [not_null]
      - name: mode
        data_tests:
          - not_null
          - accepted_values:
              values: ['income', 'payment', 'transfer']
      - name: transaction_date
        data_tests: [not_null]
      - name: amount
        data_tests: [not_null]
