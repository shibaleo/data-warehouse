version: 2

# Sources point at base append-only tables. The *_current dbt models
# (in models/wrappers/) are thin wrappers around raw_at(table) that
# provide the active-row projection. stg models reference those wrappers
# via {{ ref('<table>_current') }} so dbt's lineage is:
#   source(base table) → ref(wrapper) → ref(stg) → ref(dim/fct/rpt)

sources:
  - name: raw_toggl_track
    description: "Toggl Track raw API responses (append-only base tables)"
    schema: data_warehouse_v2
    tables:
      - name: raw_toggl_track__time_entries
        description: "Toggl Track API v9 time entries — full revision history"
      - name: raw_toggl_track__time_entries_report
        description: "Toggl Reports API v3 time entries — full revision history"
      - name: raw_toggl_track__projects
        description: "Toggl Track projects — full revision history"
      - name: raw_toggl_track__clients
        description: "Toggl Track clients — full revision history"
      - name: raw_toggl_track__tags
        description: "Toggl Track tags — full revision history"
      - name: raw_toggl_track__workspaces
        description: "Toggl Track workspaces — full revision history"
      - name: raw_toggl_track__users
        description: "Toggl Track workspace users — full revision history"
      - name: raw_toggl_track__me
        description: "Toggl Track current user profile — full revision history"
      - name: raw_toggl_track__groups
        description: "Toggl Track workspace groups — full revision history"
