name: 'dwh'
version: '1.0.0'

profile: 'dwh'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

vars:
  timezone: "Asia/Tokyo"

models:
  dwh:
    +persist_docs:
      relation: true
      columns: true
    staging:
      +materialized: view
    dimensions:
      +materialized: view
    facts:
      +materialized: view
      +schema: data_presentation
    reports:
      +materialized: view
      +schema: data_presentation

seeds:
  dwh:
    +persist_docs:
      relation: true
      columns: true
